<meta name="description" content="Application communautaire non-officielle pour les fans de GTA 6 : classement mondial, chat, quiz, galerie et assistant IA.">

<link href="https://fonts.googleapis.com/css2?family=Anton&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0A0D18;
    --bg-panel:#12162A;
    --bg-panel-2:#191233;
    --line:#2A2A46;
    --text:#F2F0EA;
    --text-dim:#9691B5;
    --magenta:#FF2E93;
    --teal:#00E5C7;
    --orange:#FF6B35;
    --yellow:#FFD23F;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'Manrope',sans-serif;-webkit-font-smoothing:antialiased;}
  body{min-height:100vh;overflow-x:hidden;}
  a{color:inherit;}

  /* ---- background grid horizon signature ---- */
  .horizon{
    position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;
    background:
      radial-gradient(120% 60% at 50% 0%, rgba(255,46,147,0.18), transparent 60%),
      radial-gradient(120% 60% at 50% 100%, rgba(0,229,199,0.12), transparent 55%),
      var(--bg);
  }
  .horizon svg{position:absolute;bottom:-5%;left:50%;transform:translateX(-50%);width:140%;max-width:1600px;opacity:0.35;}
  .horizon .sun{position:absolute;top:6%;left:50%;transform:translateX(-50%);width:280px;height:280px;border-radius:50%;
    background:linear-gradient(180deg,var(--yellow),var(--orange) 45%,var(--magenta));filter:blur(2px);opacity:0.18;}

  #app{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:0 18px 100px;}

  /* ---- topbar ---- */
  header.top{display:flex;align-items:center;justify-content:space-between;padding:22px 0 14px;gap:12px;flex-wrap:wrap;}
  .logo{display:flex;align-items:baseline;gap:8px;font-family:'Anton',sans-serif;letter-spacing:0.5px;}
  .logo .g6{font-size:clamp(26px,4vw,34px);color:var(--text);text-shadow:0 0 18px rgba(255,46,147,0.55), 0 0 2px var(--magenta);}
  .logo .hub{font-size:clamp(26px,4vw,34px);color:var(--teal);text-shadow:0 0 18px rgba(0,229,199,0.55);}
  .logo small{font-family:'Manrope';font-weight:600;font-size:11px;color:var(--text-dim);letter-spacing:1.5px;text-transform:uppercase;margin-left:2px;}

  .top-actions{display:flex;align-items:center;gap:10px;}
  .lang-toggle{display:flex;background:var(--bg-panel);border:1px solid var(--line);border-radius:999px;padding:3px;}
  .lang-toggle button{border:none;background:transparent;color:var(--text-dim);font-family:'JetBrains Mono';font-size:12px;font-weight:700;padding:6px 12px;border-radius:999px;cursor:pointer;transition:.15s;}
  .lang-toggle button.active{background:var(--magenta);color:#fff;}

  .account-chip{display:flex;align-items:center;gap:8px;background:var(--bg-panel);border:1px solid var(--line);border-radius:999px;padding:6px 14px 6px 6px;cursor:pointer;}
  .account-chip .av{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--magenta),var(--teal));display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;}
  .account-chip span{font-size:13px;font-weight:700;}

  .btn{border:none;border-radius:10px;padding:10px 16px;font-family:'Manrope';font-weight:700;font-size:14px;cursor:pointer;transition:.15s;}
  .btn-primary{background:var(--magenta);color:#fff;}
  .btn-primary:hover{filter:brightness(1.1);}
  .btn-ghost{background:transparent;border:1px solid var(--line);color:var(--text);}
  .btn-ghost:hover{border-color:var(--teal);}
  .btn-teal{background:var(--teal);color:#03231d;}

  /* ---- nav tabs ---- */
  nav.tabs{display:flex;gap:6px;overflow-x:auto;padding:6px 0 18px;scrollbar-width:none;}
  nav.tabs::-webkit-scrollbar{display:none;}
  nav.tabs button{flex:0 0 auto;background:var(--bg-panel);border:1px solid var(--line);color:var(--text-dim);font-family:'Manrope';font-weight:700;font-size:13px;padding:10px 16px;border-radius:10px;cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap;}
  nav.tabs button.active{background:var(--bg-panel-2);border-color:var(--magenta);color:var(--text);box-shadow:0 0 0 1px var(--magenta) inset;}

  /* ---- hero ---- */
  .hero{position:relative;border-radius:20px;overflow:hidden;padding:40px 28px;margin-bottom:24px;
    background:linear-gradient(135deg, rgba(255,46,147,0.15), rgba(0,229,199,0.08)), var(--bg-panel);
    border:1px solid var(--line);}
  .hero h1{font-family:'Anton';font-size:clamp(30px,5.5vw,54px);line-height:1.02;margin:0 0 12px;letter-spacing:0.5px;}
  .hero h1 .accent{color:var(--magenta);}
  .hero p{color:var(--text-dim);font-size:15px;max-width:520px;margin:0 0 20px;line-height:1.55;}
  .hero-stats{display:flex;gap:22px;flex-wrap:wrap;margin-top:18px;}
  .hero-stats div{font-family:'JetBrains Mono';}
  .hero-stats .num{font-size:22px;font-weight:700;color:var(--teal);}
  .hero-stats .lbl{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;}

  /* ---- panels/cards ---- */
  .panel{background:var(--bg-panel);border:1px solid var(--line);border-radius:var(--radius);padding:22px;margin-bottom:18px;}
  .panel h2{font-family:'Anton';font-size:22px;margin:0 0 4px;letter-spacing:0.3px;}
  .panel .sub{color:var(--text-dim);font-size:13px;margin:0 0 18px;}

  /* leaderboard */
  .lb-row{display:flex;align-items:center;gap:12px;padding:11px 10px;border-radius:10px;border-bottom:1px solid var(--line);}
  .lb-row:last-child{border-bottom:none;}
  .lb-rank{font-family:'JetBrains Mono';font-weight:700;width:30px;color:var(--text-dim);}
  .lb-row:nth-child(1) .lb-rank{color:var(--yellow);}
  .lb-row:nth-child(2) .lb-rank{color:#C9CBD6;}
  .lb-row:nth-child(3) .lb-rank{color:var(--orange);}
  .lb-name{flex:1;font-weight:700;font-size:14px;}
  .lb-country{font-size:11px;color:var(--text-dim);font-family:'JetBrains Mono';}
  .lb-score{font-family:'JetBrains Mono';font-weight:700;color:var(--teal);}

  /* chat */
  .chat-box{height:380px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding:6px 4px 10px;margin-bottom:12px;}
  .msg{max-width:78%;padding:9px 13px;border-radius:12px;font-size:14px;line-height:1.4;background:var(--bg-panel-2);border:1px solid var(--line);}
  .msg .who{font-family:'JetBrains Mono';font-size:11px;color:var(--teal);margin-bottom:3px;font-weight:700;}
  .msg.mine{align-self:flex-end;background:rgba(255,46,147,0.16);border-color:rgba(255,46,147,0.4);}
  .chat-input{display:flex;gap:8px;}
  .chat-input input{flex:1;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:11px 14px;color:var(--text);font-family:'Manrope';font-size:14px;}
  .chat-input input:focus{outline:none;border-color:var(--teal);}

  /* quiz */
  .quiz-q{font-weight:700;font-size:16px;margin-bottom:14px;}
  .quiz-opt{display:block;width:100%;text-align:left;background:var(--bg);border:1px solid var(--line);color:var(--text);padding:12px 14px;border-radius:10px;margin-bottom:9px;cursor:pointer;font-family:'Manrope';font-size:14px;font-weight:600;transition:.12s;}
  .quiz-opt:hover{border-color:var(--teal);}
  .quiz-opt.correct{border-color:var(--teal);background:rgba(0,229,199,0.14);}
  .quiz-opt.wrong{border-color:var(--magenta);background:rgba(255,46,147,0.14);}
  .quiz-progress{font-family:'JetBrains Mono';font-size:12px;color:var(--text-dim);margin-bottom:16px;}

  /* gallery */
  .gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;}
  .g-card{background:var(--bg-panel-2);border:1px solid var(--line);border-radius:12px;overflow:hidden;}
  .g-card img{width:100%;height:150px;object-fit:cover;display:block;background:#000;}
  .g-card .body{padding:10px 12px;}
  .g-card .cat{font-family:'JetBrains Mono';font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--orange);}
  .g-card .cap{font-size:13px;margin:4px 0 8px;color:var(--text);}
  .g-card .foot{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--text-dim);}
  .like-btn{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:13px;font-weight:700;}
  .like-btn.liked{color:var(--magenta);}

  /* ai chat */
  .ai-box{min-height:280px;max-height:420px;overflow-y:auto;display:flex;flex-direction:column;gap:12px;margin-bottom:12px;padding:4px;}
  .ai-msg{padding:10px 14px;border-radius:12px;font-size:14px;line-height:1.5;max-width:85%;white-space:pre-wrap;}
  .ai-msg.user{align-self:flex-end;background:rgba(255,46,147,0.16);border:1px solid rgba(255,46,147,0.4);}
  .ai-msg.assistant{align-self:flex-start;background:var(--bg-panel-2);border:1px solid var(--line);}
  .ai-msg .tag{font-family:'JetBrains Mono';font-size:10px;color:var(--teal);margin-bottom:4px;font-weight:700;text-transform:uppercase;}

  input,textarea{font-family:'Manrope';}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12px;color:var(--text-dim);margin-bottom:6px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;}
  .field input,.field select{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:11px 14px;color:var(--text);font-size:14px;}
  .field input:focus,.field select:focus{outline:none;border-color:var(--teal);}

  .modal-overlay{position:fixed;inset:0;background:rgba(4,5,10,0.75);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:50;padding:16px;}
  .modal{background:var(--bg-panel);border:1px solid var(--line);border-radius:16px;padding:28px;width:100%;max-width:400px;}
  .modal h3{font-family:'Anton';font-size:22px;margin:0 0 4px;}
  .modal .sub{color:var(--text-dim);font-size:13px;margin-bottom:18px;}
  .modal-tabs{display:flex;gap:8px;margin-bottom:18px;}
  .modal-tabs button{flex:1;background:var(--bg);border:1px solid var(--line);color:var(--text-dim);padding:9px;border-radius:9px;font-weight:700;font-size:13px;cursor:pointer;}
  .modal-tabs button.active{background:var(--magenta);color:#fff;border-color:var(--magenta);}
  .error-msg{color:var(--magenta);font-size:13px;margin-top:-6px;margin-bottom:12px;}
  .close-x{position:absolute;top:16px;right:18px;background:none;border:none;color:var(--text-dim);font-size:20px;cursor:pointer;}

  .empty{color:var(--text-dim);font-size:14px;padding:20px 0;text-align:center;}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--bg-panel-2);border:1px solid var(--teal);color:var(--text);padding:12px 20px;border-radius:10px;font-size:13px;font-weight:700;z-index:100;box-shadow:0 8px 24px rgba(0,0,0,0.4);}

  footer{text-align:center;color:var(--text-dim);font-size:12px;padding:30px 0 10px;line-height:1.6;}

  @media (max-width:640px){
    .hero{padding:28px 18px;}
    .hero-stats{gap:16px;}
  }
</style>
</head>

/* ============ QUIZ DATA (bilingual, officially confirmed facts only) ============ */

  {

async function api(path, opts){
  const res = await fetch('/api/' + path, opts);
  let data = {};
  try { data = await res.json(); } catch {}
  if (!res.ok) throw new Error(data.error || ('Erreur ' + res.status));
  return data;
}

/* ============ AUTH ============ */
async function doAuth(action, pseudo, pin, country){
  try{
    const data = await api('auth', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({action, pseudo, pin, country})
    });
    state.user = data.user;
    localStorage.setItem('g6_user', JSON.stringify(data.user));
    state.showAuth = false;
    showToast(state.lang==='fr' ? 'Bienvenue ' + data.user.pseudo + ' !' : 'Welcome ' + data.user.pseudo + '!');
    render();
    loadLeaderboard();
  } catch(e){
    state.authError = e.message;
    render();
  }
}
function logout(){
  state.user = null;
  localStorage.removeItem('g6_user');
  render();
}

/* ============ DATA LOADERS ============ */
async function loadLeaderboard(){
  try{ const d = await api('leaderboard'); state.leaderboard = d.leaderboard || []; render(); }catch(e){}
}
async function loadChat(){
  try{ const d = await api('chat'); state.chatMessages = d.messages || []; render(); }catch(e){}
}
async function loadGallery(){
  try{ const d = await api('gallery'); state.galleryItems = d.items || []; render(); }catch(e){}
}

async function sendChat(text){
  if (!state.user){ state.showAuth = true; state.authMode='login'; render(); return; }
  if (!text.trim()) return;
  try{
    await api('chat', {method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({pseudo: state.user.pseudo, token: state.user.token, text})});
    await loadChat();
  } catch(e){ showToast(e.message); }
}

async function postGallery(imageUrl, category, caption){
  if (!state.user){ state.showAuth = true; render(); return; }
  try{
    await api('gallery', {method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({pseudo: state.user.pseudo, token: state.user.token, imageUrl, category, caption})});
    await loadGallery();
    showToast(state.lang==='fr' ? 'Publié !' : 'Posted!');
  } catch(e){ showToast(e.message); }
}

async function likeGallery(id){
  if (!state.user){ state.showAuth = true; render(); return; }
  try{
    await api('gallery', {method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({action:'like', id, pseudo: state.user.pseudo, token: state.user.token})});
    await loadGallery();
  } catch(e){ showToast(e.message); }
}

    async function submitQuizScore(points, time){
  if (!state.user) return;
  try{
    const d = await api('leaderboard', {method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({pseudo: state.user.pseudo, token: state.user.token, points, time})});
    state.user.score = d.score; if (d.bestTime) state.user.bestTime = d.bestTime;
    localStorage.setItem('g6_user', JSON.stringify(state.user));
    loadLeaderboard();
  } catch(e){}
}

async function sendAI(text){
  if (!text.trim()) return;
  state.aiMessages.push({role:'user', content:text});
  state.aiTyping = true;
  render();
  try{
    const d = await api('ai-chat', {method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({messages: state.aiMessages})});
    state.aiMessages.push({role:'assistant', content: d.reply});
  } catch(e){
    state.aiMessages.push({role:'assistant', content: (state.lang==='fr' ? 'Erreur : ' : 'Error: ') + e.message});
  }
  state.aiTyping = false;
  render();
}

/* ============ QUIZ LOGIC ============ */
      let quizTimerId = null;
      const QUIZ_QUESTION_SECONDS = 20;
      function clearQuizTimer(){ if (quizTimerId){ clearInterval(quizTimerId); quizTimerId = null; } }
      function startQuestionTimer(){
              clearQuizTimer();
              state.quizTimeLeft = QUIZ_QUESTION_SECONDS;
              quizTimerId = setInterval(() => {
                        state.quizTimeLeft--;
                        const el = document.getElementById('quiz-timer-val');
                        if (el) el.textContent = state.quizTimeLeft;
                        if (state.quizTimeLeft <= 0){
                                    clearQuizTimer();
                                    if (state.quizAnswered === null) state.quizAnswered = -1;
                                    nextQuiz();
                        }
              }, 1000);
      }
      function fmtTime(sec){
              if (sec == null) return '--';
              const m = Math.floor(sec / 60); const s = sec % 60;
              return m + ':' + (s < 10 ? '0' : '') + s;
      }
function startQuiz(){
      state.quizActive = true; state.quizIndex = 0; state.quizScore = 0; state.quizAnswered = null; state.quizData = null; state.quizLoading = true; state.quizStartTime = Date.now();
      render();
      api('quiz', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({lang: state.lang})}).then(d => {
              state.quizData = (d && Array.isArray(d.questions) && d.questions.length) ? d.questions : QUIZ.map(q => ({question: q[state.lang].q, choices: q[state.lang].opts, answerIndex: q.correct, note: 'officiel'}));
              state.quizLoading = false;
              render(); startQuestionTimer();
      }).catch(() => {
              state.quizData = QUIZ.map(q => ({question: q[state.lang].q, choices: q[state.lang].opts, answerIndex: q.correct, note: 'officiel'}));
              state.quizLoading = false;
              render(); startQuestionTimer();
      });
}
function answerQuiz(idx){
      if (state.quizAnswered !== null || !state.quizData) return;
      state.quizAnswered = idx; clearQuizTimer();
      if (idx === state.quizData[state.quizIndex].answerIndex) state.quizScore++;
      render();
}
function nextQuiz(){
  if (state.quizIndex + 1 >= state.quizData.length){
          clearQuizTimer();
          const elapsed = Math.round((Date.now() - (state.quizStartTime || Date.now())) / 1000);
          state.quizLastTime = elapsed;
    const pts = state.quizScore * 15;
          submitQuizScore(pts, elapsed);
    state.quizActive = false;
    state.quizFinished = true;
    render();
    return;
  }
  state.quizIndex++;
  state.quizAnswered = null; startQuestionTimer();
  render();
}
function restartQuiz(){ state.quizFinished = false; startQuiz(); }

/* ============ RENDER ============ */
function el(html){ const d = document.createElement('div'); d.innerHTML = html; return d.firstElementChild; }
function esc(s){ return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function releaseCountdown(){
  const target = new Date('2026-11-19T00:00:00Z').getTime();
  const diff = target - Date.now();
  return Math.max(0, Math.ceil(diff / 86400000));
}

      if (state.quizFinished){
              return `
                    <div class="panel" style="text-align:center;">

function render(){
  const app = document.getElementById('app');
  let body = '';
  if (state.tab==='home') body = renderHome();
  else if (state.tab==='rank') body = renderRank();
  else if (state.tab==='chat') body = renderChat();
  else if (state.tab==='quiz') body = renderQuiz();
  else if (state.tab==='gallery') body = renderGallery();
  else if (state.tab==='ai') body = renderAI();

  app.innerHTML = `
    ${renderHeader()}
    ${renderTabs()}
    ${body}
    <footer>${esc(t('footerText'))}<br/>GTA6 HUB — 2026</footer>
    ${renderAuthModal()}
    ${state.toastMsg ? `<div class="toast">${esc(state.toastMsg)}</div>` : ''}
  `;

  attachEvents();

  const chatBox = document.getElementById('chatBox');
  if (chatBox) chatBox.scrollTop = chatBox.scrollHeight;
  const aiBox = document.getElementById('aiBox');
  if (aiBox) aiBox.scrollTop = aiBox.scrollHeight;
}

function attachEvents(){
  document.querySelectorAll('[data-lang]').forEach(b => b.onclick = () => setLang(b.dataset.lang));
  document.querySelectorAll('[data-tab]').forEach(b => b.onclick = () => { state.tab = b.dataset.tab; state.quizFinished=false; render();
    if (b.dataset.tab==='rank') loadLeaderboard();
    if (b.dataset.tab==='chat') loadChat();
    if (b.dataset.tab==='gallery') loadGallery();
  });

  const openAuth = document.getElementById('openAuth');
  if (openAuth) openAuth.onclick = () => { state.showAuth = true; state.authMode='login'; state.authError=null; render(); };
  const closeAuth = document.getElementById('closeAuth');
  if (closeAuth) closeAuth.onclick = () => { state.showAuth = false; render(); };
  const overlay = document.getElementById('modalOverlay');
  if (overlay) overlay.onclick = (e) => { if (e.target === overlay){ state.showAuth=false; render(); } };

  document.querySelectorAll('[data-mode]').forEach(b => b.onclick = () => { state.authMode = b.dataset.mode; state.authError=null; render(); });

  const authSubmit = document.getElementById('authSubmit');
  if (authSubmit) authSubmit.onclick = () => {
    const pseudo = document.getElementById('authPseudo').value.trim();
    const pin = document.getElementById('authPin').value.trim();
    const countryEl = document.getElementById('authCountry');
    const country = countryEl ? countryEl.value.trim().toUpperCase() : undefined;
    doAuth(state.authMode, pseudo, pin, country);
  };

  const accountChip = document.getElementById('accountChip');
  if (accountChip) accountChip.onclick = () => { if (confirm(state.lang==='fr'?'Se déconnecter ?':'Log out?')) logout(); };

  const chatInput = document.getElementById('chatInput');
  const chatSendBtn = document.getElementById('chatSendBtn');
  if (chatSendBtn) chatSendBtn.onclick = () => { sendChat(chatInput.value); chatInput.value=''; };
  if (chatInput) chatInput.onkeydown = (e) => { if (e.key==='Enter'){ sendChat(chatInput.value); chatInput.value=''; } };

  const startQuizBtn = document.getElementById('startQuizBtn');
  if (startQuizBtn) startQuizBtn.onclick = () => {
    if (!state.user){ state.showAuth=true; render(); return; }
    startQuiz();
  };
  const restartQuizBtn = document.getElementById('restartQuizBtn');
  if (restartQuizBtn) restartQuizBtn.onclick = restartQuiz;
  document.querySelectorAll('[data-idx]').forEach(b => b.onclick = () => answerQuiz(parseInt(b.dataset.idx)));
  const nextQuizBtn = document.getElementById('nextQuizBtn');
  if (nextQuizBtn) nextQuizBtn.onclick = nextQuiz;

  const postGalleryBtn = document.getElementById('postGalleryBtn');
  if (postGalleryBtn) postGalleryBtn.onclick = () => {
    const url = document.getElementById('gImgUrl').value.trim();
    const cat = document.getElementById('gCategory').value;
    const cap = document.getElementById('gCaption').value.trim();
    if (!url){ showToast(state.lang==='fr'?'Ajoute un lien image':'Add an image link'); return; }
    postGallery(url, cat, cap);
  };
  document.querySelectorAll('[data-like]').forEach(b => b.onclick = () => likeGallery(b.dataset.like));

  const aiInput = document.getElementById('aiInput');
  const aiSendBtn = document.getElementById('aiSendBtn');
  if (aiSendBtn) aiSendBtn.onclick = () => { const v = aiInput.value; aiInput.value=''; sendAI(v); };
  if (aiInput) aiInput.onkeydown = (e) => { if (e.key==='Enter'){ const v = aiInput.value; aiInput.value=''; sendAI(v); } };
}

render();
loadLeaderboard();
loadChat();
loadGallery();
setInterval(() => { if (state.tab==='chat') loadChat(); }, 5000);
setInterval(() => { if (state.tab==='rank') loadLeaderboard(); }, 15000);
</script>
